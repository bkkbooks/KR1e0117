body:
  text: 春秋左氏傳小疏春秋類提要臣等謹案春秋左氏傳小疏一卷國朝沈彤撰彤有尚書小疏已著録是編以趙汸顧炎武所補左傳杜注為未盡更為訂正其中得失互見如文公二十六年傳享子展賜之先路三命之服先八邑賜子産次路再命之服先六邑彤謂八邑六邑其數少乃司勳所云賞地非采邑之加田疏亦誤今考司勳曰凡頒賞地參之一食惟加田無國正注曰加田既賞之又加賜以田所以厚恩也據此則是特以賞田有所未盡更加以賞未有賞田反少加田反多者今彤謂八邑六邑為數少當是賞地則加田為數當多矣與周禮殊為未合蓋彤著周官祿田考誤以大司徒注小都大都旁加之數即為司勳之加田故今以子展子産皆國卿若受加田則約得小都旁加四里傳云八邑者據注不過三十二井云六邑者不過二十四井故疑其數少非加田其實皆不然也又如文公元年傳歸餘于終彤謂積氣朔餘日以置閏在四季月故曰歸餘于終經傳所書閏月皆不得其正惟昭公二十年閏八月于夏時適為閏六月偶合耳今考昭公二十年書春王正月傳曰二十年春二月己丑日南至杜注謂當言正月己丑日南至時史失閏更在二月後故經因史而書正月傳更具于二月疏謂厯之正法往年十二月後宜置閏月即此年正月當是往年閏月此年二月乃是正月時史于往年錯不置閏閏更在二月之後傳于八月之下乃云閏月戊辰殺宣姜是也注不言在八月後而云在二月後者以正月之前當置閏二月之後即不可也據此則是年八月置閏正史官之失彤反以為偶合亦非也然如襄公二十八年傳今倍其賦孔疏謂賞地之稅三分王食其一二入于王臣此采邑貢王之數然則諸侯之臣受采地者亦當三分之一歸于公言重倍其賦當以三分而二入公今考采邑貢王大司徒注曰采地食者皆四之一百里之國凡四都一都之田稅入于王五十里之國凡四縣一縣之田稅入于王二十五里之國凡四甸一甸之田稅入于王其賞地貢王則孔疏所引司勳注三分計稅王食其一是也然則采地賞地貢數顯異今孔疏于侯國采地之賦不計四分之一而計三分之一是誤以賞地為采地矣彤辨正其非足闢相沿之謬又如文公二十五年傳賦車兵徒兵杜注云車兵甲士孔疏云知非兵器者上云數甲兵下云甲楯之數故知此謂人也顧炎武謂執兵者之稱兵自秦漢始三代以上無之凡杜之以士卒解兵者皆非彤引隱公五年傳諸侯之師敗鄭徒兵襄公元年傳敗其徒兵于洧上云徒兵則不得謂非士卒矣亦可以補正顧氏之失雖未完之書録而存之于讀左傳者亦有所禆也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
