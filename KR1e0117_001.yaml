body:
  text: 春秋左傳小疏呉江沈彤撰隠公元年經春王正月書王正月乃列國史官記事之常法否則嫌於不禀正朔矣周時月並改而此不去王春者春天時不可繫於王也然王在春下正上則時月亦兼統之古書法有如此者鄭伯克段於鄢段固强大雋傑而以出奔共未見獲故傳以如二君解之杜謂即得雋例誤傳不如早為之所為之所謂居以可制之邑無使滋蔓滋蔓喻居京如二君故曰克非得雋而曰克故傳别解之趙子常以此為春秋特筆是也謂之鄭志鄭伯志於克不志於殺若請制而即使居之則志於殺矣解據穀梁傳誤弔生不及哀自始死及殯自啟及反哭皆主人所至哀故哭踊無算否亦代哭不絶聲此句主弔塟言則所謂哀者指自啟至反哭時也弔塟之禮凡有五節一啟殯而弔既夕云請啟期告於賓正義云使知而來赴弔下經遂云主人拜賓檀弓亦云君於大夫將塟弔於宫是也一祖而弔既夕云有司請祖期注云當以告賓下經遂云賓出主人送檀弓亦云君於大夫將塟弔於朝是也檀弓所云弔於朝亦行於祖後一柩車將行而弔既夕云賓入者拜之正義云弔塟之賓下經遂云乃行是也一哀次而弔檀弓云君於大夫將塟弔於哀次是也一反哭而弔既夕云乃反哭賓弔者升自西階曰如之何檀弓亦云周反哭而弔是也所以有此五節者或恩義有厚薄道路有逺近事勢有順逆故早晚正變不必齊同然其在塟時則一也今宰咺之來弔踰塟期以月數矣故曰不及哀顧氏杜解補正云不及哀謂不當既封反哭之時彤按檀弓疏論君於大夫將塟弔於宫朝哀次之義云君弔正禮當於殯宫或於朝祖廟無門外君弔之禮君來弔或晚有邂逅於哀次弔焉此明弔之正必於門内也又雜記云相趨也出宫而退相揖也哀次而退相問也既封而退相見也反哭而退朋友虞祔而退夫弔賓於哀次已有隨分而退者是哀次之弔已緩況既封與反哭耶又既封反哭之弔當即相見朋友之未退者為之非必至是方來之賓也顧說未盡三年經春王二月按考古圖載晉姜鼎銘曰維王九月博古圖載周仲偁父鼎銘曰維王五月敔敦銘曰維王十月是每月皆書王也此惟春三月書王餘月可以例推必兼書王二月王三月者明商正改為二月夏正改為三月也此春秋文外之意盖周公舊典則然傳王曰無之無之約無怨與貳命以義夫謂宣公立穆公之命出於義也正義誤商頌曰殷受命咸宜百禄是荷其是之謂乎引商頌美宣公與穆公也不及殤公且殤公亦非所謂百禄是荷者解非十一年傳而况能禋祀許乎言子孫不能禋祀許所以決許公之將復奉社稷也不惟許國之為亦聊以固吾圉也許國之為結吾子奉許叔聊以固吾圉結無滋他族偪處莊二十二年傳遇觀之否此與哀九年趙鞅卜救鄭遇水適火一例之亦適也洪氏容齋三筆訓為變按繫詞云唯變所適是變而後有所之也之字自包訓變義而以變為之字正訓則非二十八年傳臧孫辰告糴於齊禮也按周禮大司徒職大荒大札則令邦國移民通財小行人職若國凶荒則令賙委之不聞有告糴之禮也外傳稱為古制其始於西周之衰乎逸周書糴匡篇云大荒卿參告糴盖亦記哀周之制閔元年傳天子曰兆民諸侯曰萬民天子曰兆民若尚書吕刑所稱兆民賴之是也諸侯曰萬民若魯頌閟宫之美僖公曰萬民是若是也但盤庚云汝萬民乃不生生則天子亦有稱萬民者周禮疏云兆民據天下而言萬民據畿内而言也二年傳尨涼恵定宁云說文引作牻㹁云牻白黑雜毛牛㹁牻牛也古文省少或借涼為㹁彤按廣韻云㹁牻牛駁色盖說文脫二字牻㹁謂牻服色駁也否則冬與金玦皆有義而牻獨無乎上文偏衣即牻服盖分織牻牛白黑毛為之下所謂奇無常也僖二年傳冀之既病則亦惟君故盖稱虞之能報讐雪恥以引起己之請罪於虢使假道之言易入解云稱其强誤十一年傳賜晉侯命受玉惰命謂策命周禮内史職凡命諸侯及孤卿大夫則策命之典命云侯伯七命玉謂命圭古禮諸侯薨還圭見白虎通崩薨篇策命新君仍賜之十二年傳有天子之二守國髙在王制曰次國三卿二卿命於天子一卿命於其君正義云次國侯伯也齊侯爵故二卿命於天子命於天子者皆謂上卿命於其君者謂之下卿十五年傳涉河侯車敗此五字正卜人之言乃明所以吉之義也當從杜解顧說非三敗及韓正義謂晉之車乘三度與秦戰而敗壞是也顧依劉光伯說非姪其從姑解離為震妹於火為姑火當作兌二十三年傳而享其生禄楚語觀射父云能知四時之生韋昭云生嘉穀韭卵之屬漢書郊祀志云神降之嘉生應劭云嘉穀也此生字當亦謂穀不如正義所云也尚書克綏先生之禄永底烝民之生亦以生與禄對言二十四年傳故糾合宗族於成周而作詩曰作下當有樂字其字三十一年傳禮不卜常祀謂常祀必以時祀不更卜祀之吉凶經下疏以為不卜日誤三十二年傳勤而無所必有悖心無所無以自處謂徙勞無功悖背上命謂舍鄭他圖定宇云襲鄭不能而生滅滑之心是也文元年先王之正時也履端於始舉正於中歸餘於終周書周月篇云敬授人時巡狩祭享猶自夏焉夫閏以正時時以作事則此所謂時乃夏時也始中終即每時而言履端於始謂測算斗建以紀啟閉在四孟月也淮南天文訓稱斗杓正月建寅月從左行十二辰以厯家實測追溯之周與漢固同建也舉正於中謂厯象日景中星以紀分至在四仲月也按隋厯志堯時冬至日躔危唐厯志云躔虚宋天文志西周以前冬至日躔女元厯志謂堯時冬至日在女虚之交皆在正北之位冬至在正北則夏至在正南春秋分在正東正西可知故指其所在之位而稱為正也杜解舉中氣以正月則以正為月以中為氣文義不可通矣歸餘於終謂積氣朔餘日以置閏在四季月也周禮太史職閏月詔王居門終月疏云明堂路寢及宗廟皆有五室十二堂四門十二月聽朔於十二堂閏月各於時之門是周本於四季月置閏也經傳所書閏月皆不得其月惟昭二十年閏八月於夏時適為閏六月此偶合耳歸餘於終事則不悖凡作事必順時序閏每時季月則畢所未及作者不至過時故曰不悖若閏在嵗末則過時而悖者有矣十六年傳使帥甸攻而殺之解帥甸郊甸之帥郊當作邦周禮天官三曰邦甸之賦本亦誤邦為郊正義謂杜舉類言之乃為之辭也宣六年傳使疾其民以盈其貫疾害也若酒誥厥心疾很之疾疾其民謂重民賦役也貫劉光伯謂如物在繩索之貫也定宇云韓非子亦有滿貫之云劉說是盖上數戰則賦役必重而害民之惡遂如物之滿於繩索矣杜云為民所疾又云貫猶習也恐於文意隔閡十二年傳其君之戎分為二廣廣有一卒卒偏之兩闕以上原闕四葉八行髮而後結為紒其他則亦如幓頭之制耳屈布為崇巾著於顙上此制直始於漢古者有冠無巾本後漢輿服志寧有婦人之顙而獨著巾者然則三說之得失皆可知矣婦人弔服詳見檀弓記注九年傳使伯氏司里解司里里宰正義云此言司城内之民若今城内之坊里也里必有長不知其官之名周禮有里宰故以宰言之非是郊外二十五家之長按宋當以百户為里里長當名里尹雜記里尹主之註云里尹閭胥里宰之屬王度記曰百戸為里里一尹其禄如庶人在官者正義云按周禮六鄉之内二十五家為閭閭置一胥中士也六遂之内二十五家為里里置一宰下士也别錄云王度記似齊宣王時淳于髠等所說也又按撰考云古者七十二家為里洛誥傳云古者八家為鄰三鄰為朋三朋為里鄭云盖虞夏時制也其百户為里未知何代或云殷制彤謂百户為里如周侯國之遂之鄼里尹如鄼長鄼長為下士詳余周官禄田考里尹之禄如庶人在官者即孟子王制所謂下士與庶人在官者同禄也孟子王制多周所沿夏商之制則殷制之云當然故知宋以百户為里而里長名里尹也但城内郊外之同異則無從考耳十三年傳小人農力以事其上陳少章云宋本農作展當從之唐石經初刻作展後改農先王卜征五年此盖楚先王之故事因楚子伐鄭不利在不能修徳故援此立說卜征謂卜伐國尊楚故以上伐下之名歸之註云巡狩似與本事無干廷芳按以十八年楚康王告子庚語參之則小疏良是十四年傳若困民之主匱神乏祀主當作生乏當作之十八年傳天道多在西北解云嵗在豕韋疏云豕韋一名娵訾按說文韋相背也从舛口聲獸皮之韋可以束枉戾相韋背故借以為皮韋彤謂室壁二宿合為娵訾當屬豕之亥次而其形兩兩相背故亦名豕韋也十七年傳唯卿為大夫王制曰諸侯之上大夫卿故晏子言唯卿乃得稱大夫而行大夫之禮耳王肅云謂諸侯之卿當天子之大夫見雜記疏周無是制也二十一年傳軌度其信可明徴也謂上所行之軌迹自度有實可明驗諸人而無不慊也夏書曰念兹在兹釋兹在兹名言兹在兹允出兹在兹惟帝念功將謂由己壹也信由己壹而後功可念也八兹字隠注下功字釋則不念允出則未及名言皆預形帝念意功謂治人之功由己壹謂帝所以如是念之者由其人之能誠壹也末句咏歎以結之所以勸季孫之有功二十四年傳樂㫖君子註云言君子樂美其道㫖詩作只箋云只之言是也字與訓俱當從彼二十二年傳令倍其賦按周禮大司徒子男之地王食者四之一康成注小司徒謂畿内采地其稅皆入四之一於王從子男例推也然則侯國采地之入稅當亦如之倍其賦者入其賦之半也疏謂當以三分之二入公誤以司勲之賞地為采地矣二十四年經秋七月甲子朔日有食之既八月癸巳朔日有食之孔氏正義據劉歆三統厯以為前月日食既而後月又食於推步之術必無是理盖古書磨滅致有錯誤其說當矣而二事孰誤則未之決案極西湯若望古今交食考云魯春秋用周正七月乃夏正建寅之五月也今以法考之是月甲子日未正二刻定朔申初初刻十八分食甚實交周午宫星三度二十二分二十秒實距度一十七分三十二秒因在黄道北減氣差一十六分一十二秒得視距一分二十秒應見全食且本月徑大於日徑掩太陽邊周有奇經稱食既正與法密合由是觀之其誤在八月朔之食也二十五年傳賦車兵徒兵杜云車兵甲士徒兵步卒孔云知非兵器者上云數甲兵下云甲楯之數故知此兵謂人也盖以謂兵器則嫌於上下重叠矣按發首言使庀賦數甲兵則子木使蒍掩之事自書土田至甲揗之數則蒍掩受命庀賦數甲兵之事固相須成文也至兵與甲楯明屬異器又何嫌重叠乎劉炫云兵者戰器車上甲士與步卒所執兵各異也司兵掌五兵鄭衆云五兵戈殳㦸酋矛夷矛又曰軍事建車之五兵鄭𤣥云車之五兵鄭司農所云者是也步卒之五兵無夷矛而有弓矢孔附載其說當定從之或据顧氏日知錄謂執兵者之稱兵自秦漢始三代以上無之凡杜之以士卒解兵者皆非也此又不然隠五年諸侯之師敗鄭徒兵襄元年敗其徒兵於洧上本文明以敗為言將亦謂之非士卒耶此等宜各據文意為斷二十六年傳享子展賜之先路三命之服先八邑賜子産次路再命之服先六邑按王制次國三卿二卿命於天子此享時賜三命之服盖先得請於王而以享命之也又周禮大宗伯再命受服三命受位此三命賜服者兼之也詳通典職官之秩品篇又按典命伯之卿三命大夫再命子産已立為卿而再命者盖其位在四踰數非法鄭伯不敢聞於王而仍以大夫之爵請也註疏皆未及八邑六邑其數少乃司勲所云賞地非采邑之加田疏亦誤二十七年傳食言者不病不病言豈不病也莫之與故病又不及是言亦不必計及於是是謂致死倍楚正義非吾庸多矣庸止訓用與成十八年吾庸多矣同言楚不信而吾信吾用此多於楚矣杜解庸為功何功之有二十九年傳季武子取卞傳公冶問璽書追而與之璽說文作璽云王者印也所以主土从土爾聲又曰籀文作璽彤謂壐从土以其主土璽從玉以其刻於玉各有取義然在古則皆尊卑共之故大夫而亦有璽也說文但云王者印只據秦漢言耳又大夫食邑者亦主土則大夫之璽亦可作璽三十年傳與之田使為君復陶以為絳縣師按周禮官禄自食邑者外無大小皆收公田之穀分給之故廩人掌九穀之數以待國之匪頒賙賜稍食匪頒中禄居大半焉詳余周官禄田考春秋時若管子大匡篇桓公賦禄以粟昭元年秦楚二公子同食百人之餼皆仍給以穀也此趙孟之於絳縣老人雖使為小官而亦與之田矣晉語所謂士食田盖兼此二法戰國時之禄或一官而半田半穀商子境内篇云爵五大夫有賜邑三百家賜稅三百家言田稅言穀也皆不盡如周官本制昭元年傳以什共車必克困諸阨又克共如字讀謂彼以什徒共當一車必克困此車於阨又必克皆承上而言以明欲去車為卒之故解誤兩於前伍於後専為右角參為左角偏為前拒正義曰服䖍引司馬法云五十乘為兩百二十乘為伍八十一乘為專二十九乘為參二十五乘為偏其名與人數不可得知按服說有脫誤百二十下當有五字八十一當為百字二十九當為七十五盖二十五乘為偏二其偏為兩然則三其偏為參五其偏為伍而四其偏為專矣三其偏故七十五也四其偏故百也五其偏故百二十五也百乘名專者廣韻云專單也一言曰百兩言曰一百是百雖成數亦單數也故百乘為專也其人數則一乘百人總三百七十五乘適三萬七千五百人是三軍之數也以每五乘三百七十五人為三伍計之甲士當二百二十五伍卒當五千四百伍凡去二萬八千一百二十五人餘九千三百七十五人則將重車也二年傳觀書於太史氏見易象與魯春秋曰周禮盡在魯矣易謂周易穆子之生也莊叔以周易筮之見昭五年明魯有周易也象謂六官所布於邦國者若治象教象之類盖布治布教則必并其象而布之桓僖廟災命藏象曰舊章不可忘見哀三年明魯有所布之象也魯春秋謂據舊典禮經所記之史五十凡謂之禮經盖易者占人簭人所以辨吉凶象者六官所縣於象魏此皆周之禮也魯春秋遵五十凡為之亦周禮所在故曰周禮盡在魯也此周禮非書名吾乃今知周公之徳與周之所以王也易爻辭多周公作詳見余易爻辭辨六官之象魯春秋所據之禮經皆周公所定五十凡雖不皆周公之舊然變易者少故曰周公之徳以三者頒諸邦國使玩辭占卦以趨吉避凶修治教等法以治其國守五十凡以記事昭勸戒是周公之所以臨天下者也畏大國也猶有所易是以亂作猶有所易先明齊意非正言改易禮制作如周禮司士作六軍之士之作使也亂作謂送女不使公族大夫而使上大夫失送從逆班之制也明齊已踰禮晉不當嫌無宇非卿解以為執辱無宇則少姜敢指斥晉侯乎且亦非所以為之請矣廷芳按少姜四語辨而婉信為有辭三年傳足以昭禮命事謀闕而已禮必有事事恐有闕命事謂告所有事也謀闕謂計慮使無闕也三者皆總上朝聘㑹盟弔塟言解非其相胡公胡公為周公始封陳之祖則相乃祖字之誤正義末云今定本相作祖是也其說與服說並誤箕伯與胡公六人傳只平數之則使宅人反之此下當脫鄰人辭室一句下文違卜不詳等語乃喻使勿辭也晏子語亦有脫文或且字為曰字之誤為其復取之之故傳者即宣子為伯石請州預釋七年復州取州之故非宣子懸度也為當如字讀解與音並誤四年傳鄭子産作丘賦服䖍以為一丘之田出一馬三牛復古法彤謂既云作則非復古況又國人謗其為蠆尾渾罕譏其作法於貪乎但杜解如魯之田賦則病民已甚子産安得自謂為善而引禮義不愆之詩盖其賦視古法稍加以濟國用若魯丘甲之類耳七年傳盜所隠器當作隠所盜器觀杜解可見曰我先君共王曰發語辭七年傳日月之㑹是謂辰不曰日月所㑹而曰日月之㑹者曰所主次言曰之主㑹言也主㑹言故謂之辰正義曰辰時也言日月聚㑹有時也廷芳按堯典厯象日月星辰洪範四曰星辰大宗伯以實柴祀日月星辰馮相氏掌十有二辰之位其所謂辰者皆十二次也故孔鄭以日月所㑹訓之若𦙍征辰弗集於房房即次也而辰又主次為訓則文字重叠矣此斷宜易以文伯本語也僖五年龍尾伏辰杜解亦用文伯本語但其所以用之者有異耳十三年傳無為為善矣無為無助也言無人助我為善矣正義非二十五年傳此之謂不能庸先君之廟先君謂襄公不能庸禮指萬者二八言盖典祀之豐於昵舊矣萬者止二八而其衆萬於季氏則尤一時非常之失禮也故臧孫譏切之二十六年傳苑子之御曰視下顧視下句絶顧者記御者言時既視苑子又視林雍之足也定十五年經九月丁巳塟我君定公雨不克塟戊午日下昃乃克塟辛巳塟定姒李文貞云春秋閏月紀事有矣不書䝉上月也失禮則書不告月及塟齊景公是也塟景公何以為失禮喪以年斷者不以閏數諸侯五月而塟齊侯卒以九月塟以閏月是數閏也故以失禮書塟定姒閏九月也而不書則妾母之喪得以閏數矣見春秋隨筆彤按儀禮喪服云庶子為父後者為其母緦傳曰與尊者為一體不敢服其私親也註云君卒庶子為母大功疏云今庶子承重故緦是嗣君及公子於妾母之喪皆不以年斷故得數閏月也但以定姒為妾乃從公羊傳若據左氏則實是夫人為哀公嫡母喪不得數閏經宜書閏月而辛巳上有脫文矣哀三年傳命藏象魏此象魏當作魏象謂魏之象也因上象魏而誤倒耳象可藏魏豈可藏乎下文舊章正專指象而言十四年傳叔孫氏之車子鉏商獲麟解車子微者鉏商名按孔子家語辨物篇叔孫氏之車士曰子鉏商采薪於大野獲麟焉王肅注車士將車者將近刻作持誤子姓鉏商名是傳於車下脫士字也周制將重車者二十五人二十四人為卒一人則士故謂之車士猶將兵車者七十五人七十二人為卒三人為軍士也春秋左傳小疏
